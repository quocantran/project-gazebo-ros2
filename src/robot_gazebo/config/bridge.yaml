# Cấu hình ánh xạ các topic giữa ROS 2 và Gazebo Harmonic
---
# 1. Điều khiển động cơ (cmd_vel) - Chiều: ROS 2 -> Gazebo
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# 2. Dữ liệu cảm biến Lidar (scan) - Chiều: Gazebo -> ROS 2
- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# 3. Định vị xe (odom) - Chiều: Gazebo -> ROS 2
- ros_topic_name: "/odom"
  gz_topic_name: "/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# 4. Trạng thái các khớp bánh xe (joint_states) - Chiều: Gazebo -> ROS 2
- ros_topic_name: "/joint_states"
  gz_topic_name: "/model/robot_car/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# 5. Hệ trục tọa độ động (tf) - Chiều: Gazebo -> ROS 2 (Cho phép RViz hiển thị)
- ros_topic_name: "/tf"
  gz_topic_name: "/model/robot_car/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
