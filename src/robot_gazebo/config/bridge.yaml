# Cấu hình ánh xạ các topic giữa ROS 2 và Gazebo Harmonic
# World: warehouse_world | Model: robot_car
---
# 0. Đồng hồ mô phỏng (clock) - BẮT BUỘC khi dùng use_sim_time: True
#    Không có clock → robot_state_publisher sẽ bỏ qua mọi joint_states
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# 1. Điều khiển động cơ (cmd_vel) - Chiều: ROS 2 -> Gazebo
#    DiffDrive plugin nhận cmd_vel trực tiếp (không qua world namespace)
- ros_topic_name: "/cmd_vel"
  gz_topic_name: "/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

# 2. Dữ liệu cảm biến Lidar (scan) - Chiều: Gazebo -> ROS 2
- ros_topic_name: "/scan"
  gz_topic_name: "/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS

# 3. Định vị xe (odom) - Chiều: Gazebo -> ROS 2
- ros_topic_name: "/odom"
  gz_topic_name: "/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

# 4. Trạng thái các khớp bánh xe (joint_states) - Chiều: Gazebo -> ROS 2
#    Plugin JointStatePublisher publish qua world namespace đầy đủ
- ros_topic_name: "/joint_states"
  gz_topic_name: "/world/warehouse_world/model/robot_car/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

# 5. Hệ trục tọa độ động (tf) - Chiều: Gazebo -> ROS 2 (Cho phép RViz hiển thị)
#    DiffDrive plugin publish TF (odom->base_footprint) qua model namespace
- ros_topic_name: "/tf"
  gz_topic_name: "/model/robot_car/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
